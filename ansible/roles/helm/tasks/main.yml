---
- name: Check whether Helm is installed
  ansible.builtin.stat:
    path: /usr/local/bin/helm
  register: helm_binary

- name: Download Helm install script
  ansible.builtin.get_url:
    url: "{{ helm_install_script_url }}"
    dest: /tmp/get_helm.sh
    mode: "0755"
  when: not helm_binary.stat.exists

- name: Install Helm
  ansible.builtin.command: /tmp/get_helm.sh
  environment:
    DESIRED_VERSION: "{{ helm_version }}"
  args:
    creates: /usr/local/bin/helm
  when: not helm_binary.stat.exists

- name: Verify Helm version
  ansible.builtin.command: /usr/local/bin/helm version --short
  register: helm_version_result
  changed_when: false

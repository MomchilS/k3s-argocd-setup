---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - apt-transport-https
      - qemu-guest-agent
      - python3
      - python3-apt
    state: present

- name: Ensure qemu guest agent is running
  ansible.builtin.systemd:
    name: qemu-guest-agent
    state: started
  failed_when: false

---
- name: Check whether K3s is installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install K3s server
  ansible.builtin.shell: |
    curl -sfL "{{ k3s_install_url }}" | INSTALL_K3S_EXEC="{{ k3s_install_args }}" sh -
  args:
    creates: /usr/local/bin/k3s
  when: not k3s_binary.stat.exists

- name: Ensure K3s service is enabled and running
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started

- name: Wait for Kubernetes API to respond
  ansible.builtin.command: /usr/local/bin/kubectl get nodes
  register: k3s_nodes
  changed_when: false
  retries: 20
  delay: 6
  until: k3s_nodes.rc == 0

- name: Ensure kubeconfig is readable for retrieval
  ansible.builtin.file:
    path: "{{ kubeconfig_remote_path }}"
    mode: "0644"
